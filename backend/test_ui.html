<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>EchoTrace — Yasa Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: monospace; background: #0f0f0f; color: #e0e0e0; padding: 32px; }
    h1 { color: #7ee8a2; margin-bottom: 8px; font-size: 22px; }
    p.sub { color: #888; margin-bottom: 24px; font-size: 13px; }
    textarea {
      width: 100%; height: 80px; background: #1a1a1a; color: #fff;
      border: 1px solid #333; border-radius: 6px; padding: 12px;
      font-size: 15px; font-family: monospace; resize: vertical;
    }
    button {
      margin-top: 12px; padding: 10px 28px; background: #7ee8a2;
      color: #0f0f0f; border: none; border-radius: 6px;
      font-size: 15px; font-weight: bold; cursor: pointer;
    }
    button:disabled { background: #444; color: #888; cursor: not-allowed; }
    #status { margin-top: 12px; font-size: 13px; color: #f0a500; min-height: 20px; }

    .section { margin-top: 24px; }
    .section h2 { color: #7ee8a2; font-size: 14px; margin-bottom: 8px; }
    pre {
      background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 6px;
      padding: 14px; font-size: 12px; overflow-x: auto; white-space: pre-wrap;
    }

    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 12px; }
    .card {
      background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 6px;
      padding: 14px; text-align: center;
    }
    .card .label { font-size: 11px; color: #888; margin-bottom: 4px; }
    .card .val { font-size: 20px; color: #7ee8a2; font-weight: bold; }

    .log-line { color: #7ee8a2; margin: 2px 0; }
    .log-line.skip { color: #f0a500; }

    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th { background: #1f1f1f; color: #888; padding: 6px 10px; text-align: left; border-bottom: 1px solid #333; }
    td { padding: 5px 10px; border-bottom: 1px solid #1f1f1f; }
    tr:hover td { background: #1a2a1a; }
  </style>
</head>
<body>
  <h1>⚡ EchoTrace — Yasa Simülatörü</h1>
  <p class="sub">Herhangi bir yasa veya politika yaz, 10.000 ajan üzerinde simüle et.</p>

  <textarea id="lawInput" placeholder="Örnek: Asgari ücret 25.000 TL oldu ve emeklilere %20 zam yapıldı"></textarea>
  <br>
  <button id="runBtn" onclick="runSim()">▶ Simüle Et</button>
  <div id="status"></div>

  <div class="section" id="logSection" style="display:none">
    <h2>🤖 LLM Yorumu (Effects)</h2>
    <div id="logBox"></div>
  </div>

  <div class="section" id="metricsSection" style="display:none">
    <h2>📊 Gün 1 vs Gün 365</h2>
    <div class="grid" id="metricsGrid"></div>
  </div>

  <div class="section" id="tableSection" style="display:none">
    <h2>📅 Günlük Tablo (her 30. gün)</h2>
    <table>
      <thead>
        <tr>
          <th>Gün</th><th>Gini</th><th>İşsizlik %</th>
          <th>Ort. Tüketim ₺</th><th>Ort. Birikim ₺</th>
          <th>Kazanan</th><th>Kaybeden</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

<script>
async function runSim() {
  const text = document.getElementById('lawInput').value.trim();
  if (!text) return;

  const btn = document.getElementById('runBtn');
  const status = document.getElementById('status');
  btn.disabled = true;
  status.textContent = '⏳ LLM yasayı analiz ediyor...';

  document.getElementById('logSection').style.display = 'none';
  document.getElementById('metricsSection').style.display = 'none';
  document.getElementById('tableSection').style.display = 'none';

  try {
    const res = await fetch('http://localhost:8000/parse-and-simulate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ law_text: text })
    });

    if (!res.ok) {
      const err = await res.text();
      status.textContent = '❌ Hata: ' + err;
      btn.disabled = false;
      return;
    }

    status.textContent = '⏳ Simülasyon işleniyor...';
    const data = await res.json();
    status.textContent = `✅ Tamamlandı — ${data.total_days} gün simüle edildi.`;

    // Effect log
    const logBox = document.getElementById('logBox');
    logBox.innerHTML = data.effect_log.map(l => {
      const cls = l.startsWith('SKIP') ? 'skip' : '';
      return `<div class="log-line ${cls}">• ${l}</div>`;
    }).join('');
    document.getElementById('logSection').style.display = 'block';

    // Metrics cards
    const first = data.results[0];
    const last = data.results[data.results.length - 1];
    document.getElementById('metricsGrid').innerHTML = `
      <div class="card"><div class="label">Gini (Gün 1 → 365)</div><div class="val">${first.gini} → ${last.gini}</div></div>
      <div class="card"><div class="label">İşsizlik % (Gün 1 → 365)</div><div class="val">${(first.unemployment_rate*100).toFixed(1)}% → ${(last.unemployment_rate*100).toFixed(1)}%</div></div>
      <div class="card"><div class="label">Ort. Tüketim ₺ (Gün 1 → 365)</div><div class="val">${first.avg_consumption.toFixed(0)} → ${last.avg_consumption.toFixed(0)}</div></div>
      <div class="card"><div class="label">Kazanan (Gün 1)</div><div class="val" style="color:#7ee8a2">${first.agent_status.winners.toLocaleString()}</div></div>
      <div class="card"><div class="label">Kaybeden (Gün 365)</div><div class="val" style="color:#e87e7e">${last.agent_status.losers.toLocaleString()}</div></div>
      <div class="card"><div class="label">Vergi Geliri (Gün 1)</div><div class="val">₺${(first.tax_revenue/1000000).toFixed(1)}M</div></div>
    `;
    document.getElementById('metricsSection').style.display = 'block';

    // Table (her 30. gün)
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = data.results
      .filter((_, i) => i % 30 === 0 || i === data.results.length - 1)
      .map(r => `
        <tr>
          <td>${r.day}</td>
          <td>${r.gini}</td>
          <td>${(r.unemployment_rate*100).toFixed(1)}%</td>
          <td>₺${r.avg_consumption.toFixed(0)}</td>
          <td>₺${r.avg_savings.toFixed(0)}</td>
          <td style="color:#7ee8a2">${r.agent_status.winners.toLocaleString()}</td>
          <td style="color:#e87e7e">${r.agent_status.losers.toLocaleString()}</td>
        </tr>
      `).join('');
    document.getElementById('tableSection').style.display = 'block';

  } catch(e) {
    status.textContent = '❌ Sunucuya bağlanılamadı. uvicorn çalışıyor mu?';
  }

  btn.disabled = false;
}

document.getElementById('lawInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.ctrlKey) runSim();
});
</script>
</body>
</html>
